# Smithery configuration: https://smithery.ai/docs/build/project-config/smithery-yaml
#
# evc-team-relay-mcp is a stdio Python MCP server published to PyPI.
# Tools (9) and their JSON schemas are introspected by Smithery at runtime
# from the live server — see relay_mcp.py for the canonical definitions.
# Server metadata (name, description, version, package) lives in server.json.
#
# Auth: RELAY_AGENT_KEY (preferred for agents) or RELAY_EMAIL+RELAY_PASSWORD (fallback).

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - RELAY_CP_URL
    properties:
      RELAY_CP_URL:
        type: string
        title: Relay Control Plane URL
        description: URL of the Team Relay control plane (e.g. https://cp.yourdomain.com)
      RELAY_AGENT_KEY:
        type: string
        title: Agent Key
        description: "Agent key for vault access — preferred auth. Get from Team Relay dashboard under Shares → Agent keys."
        format: password
      RELAY_EMAIL:
        type: string
        title: Email (fallback auth)
        description: Email address — used when no agent key is set
      RELAY_PASSWORD:
        type: string
        title: Password (fallback auth)
        description: Password — used when no agent key is set
        format: password
  commandFunction:
    |-
    (config) => {
      const env = { RELAY_CP_URL: config.RELAY_CP_URL };
      if (config.RELAY_AGENT_KEY) env.RELAY_AGENT_KEY = config.RELAY_AGENT_KEY;
      if (config.RELAY_EMAIL) env.RELAY_EMAIL = config.RELAY_EMAIL;
      if (config.RELAY_PASSWORD) env.RELAY_PASSWORD = config.RELAY_PASSWORD;
      return { command: 'uvx', args: ['evc-team-relay-mcp'], env };
    }
  exampleConfig:
    RELAY_CP_URL: https://cp.example.com
    RELAY_AGENT_KEY: your-agent-key-here
